version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_db_password_123}
      POSTGRES_DB: ${DB_NAME:-borsa_app}
      TZ: Europe/Istanbul
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    env_file:
      - .env
    environment:
      - TZ=Europe/Istanbul
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-secure_db_password_123}@db:5432/${DB_NAME:-borsa_app}
    depends_on:
      - db
    command: python main.py

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - TZ=Europe/Istanbul
    depends_on:
      - backend
    command: npm run dev

volumes:
  postgres_data:
